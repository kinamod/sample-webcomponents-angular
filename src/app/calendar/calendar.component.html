<div class="calendar-container">
  <ui5-title level="H3">Task Calendar</ui5-title>
  
  <div class="calendar-wrapper">
    <ui5-calendar 
      #calendar
      (selected-dates-change)="handleDateSelect($event)">
    </ui5-calendar>
  </div>

  <div class="tasks-info" *ngIf="selectedDate">
    <ui5-title level="H5">Tasks for {{selectedDate}}</ui5-title>
    <ui5-list *ngIf="tasksForSelectedDate.length > 0">
      <ui5-li *ngFor="let task of tasksForSelectedDate">
        {{task.text}}
        <span *ngIf="task.done" style="color: green;"> ✓ Complete</span>
      </ui5-li>
    </ui5-list>
    <ui5-label *ngIf="tasksForSelectedDate.length === 0">No tasks scheduled for this date</ui5-label>
  </div>

  <div class="upcoming-tasks">
    <ui5-title level="H5">Upcoming Tasks</ui5-title>
    <ui5-list>
      <ui5-li *ngFor="let task of getUpcomingTasks()">
        <div class="task-item">
          <span class="task-text">{{task.text}}</span>
          <span class="task-date">Due: {{task.deadline}}</span>
        </div>
      </ui5-li>
    </ui5-list>
  </div>
</div>
