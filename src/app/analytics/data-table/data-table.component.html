<ui5-panel 
  header-text="Observation Data" 
  [collapsed]="collapsed"
  (toggle)="toggleCollapsed()"
  class="data-table-panel">
  
  <div class="table-controls">
    <ui5-button icon="download" design="Emphasized" (click)="exportToCsv()">Export CSV</ui5-button>
  </div>

  <ui5-table class="data-table" *ngIf="paginatedData.length > 0">
    <ui5-table-column slot="columns">
      <ui5-label>Time Period</ui5-label>
    </ui5-table-column>
    <ui5-table-column slot="columns">
      <ui5-label>Category</ui5-label>
    </ui5-table-column>
    <ui5-table-column slot="columns">
      <ui5-label>Index Value</ui5-label>
    </ui5-table-column>
    <ui5-table-column slot="columns">
      <ui5-label>Unit</ui5-label>
    </ui5-table-column>

    <ui5-table-row *ngFor="let row of paginatedData">
      <ui5-table-cell>{{formatTimePeriod(row.time)}}</ui5-table-cell>
      <ui5-table-cell>{{getCategoryLabel(row)}}</ui5-table-cell>
      <ui5-table-cell>{{row.value | number:'1.1-1'}}</ui5-table-cell>
      <ui5-table-cell>2019=100</ui5-table-cell>
    </ui5-table-row>
  </ui5-table>

  <div class="pagination" *ngIf="totalPages > 1">
    <ui5-button 
      icon="navigation-left-arrow" 
      [disabled]="currentPage === 0"
      (click)="previousPage()"
      design="Transparent">
    </ui5-button>
    <ui5-label class="page-label">Page {{currentPage + 1}} of {{totalPages}}</ui5-label>
    <ui5-button 
      icon="navigation-right-arrow" 
      [disabled]="currentPage === totalPages - 1"
      (click)="nextPage()"
      design="Transparent">
    </ui5-button>
  </div>
</ui5-panel>
